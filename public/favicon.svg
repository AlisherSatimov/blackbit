<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg { fill: #0a0a0a; }
    .mark { stroke: #ffffff; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f5f4f0; }
      .mark { stroke: #0a0a0a; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="5"/>
  <!-- > arrow -->
  <polyline class="mark" points="6,11 14,16 6,21"
    fill="none" stroke-width="2.5"
    stroke-linejoin="round" stroke-linecap="round"/>
  <!-- _ cursor -->
  <line class="mark" x1="17" y1="21" x2="27" y2="21"
    stroke-width="2.5" stroke-linecap="round"/>
</svg>
